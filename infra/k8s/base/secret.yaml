# Stub vacío — los valores reales los inyecta:
#   - en producción: el user-data del módulo ec2-k3s, que los lee desde
#     SSM Parameter Store y crea/actualiza el Secret antes del apply.
#   - en local: el overlay `local` provee valores propios para minikube.
#
# El nombre tiene que coincidir con el envFrom del Deployment.
apiVersion: v1
kind: Secret
metadata:
  name: appointment-scheduling-secret
type: Opaque
stringData:
  # DATABASE_URL: "postgresql://user:pass@host:5432/db?schema=public&sslmode=require"
  # NEXTAUTH_SECRET: "stub"
  PLACEHOLDER: "replaced-at-deploy-time"
