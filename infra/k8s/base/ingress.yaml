metadata:
  name: appointment-scheduling
spec:
  rules:
    - host: appointment-scheduling.example.com   # reemplazado por overlay/CI
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appointment-scheduling
                port:
                  number: 80
