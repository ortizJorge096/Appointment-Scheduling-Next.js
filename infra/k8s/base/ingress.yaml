apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appointment-scheduling
  annotations:
    # Cuando el backend no tiene pods listos (DB apagada = pods NotReady),
    # Traefik intercepta los 5xx y los redirige al servicio error-pages,
    # que sirve la página de mantenimiento con branding.
    traefik.ingress.kubernetes.io/router.middlewares: appointment-scheduling-error-pages@kubernetescrd
spec:
  rules:
    - host: appointment-scheduling.example.com   # reemplazado por overlay/CI
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appointment-scheduling
                port:
                  number: 80
