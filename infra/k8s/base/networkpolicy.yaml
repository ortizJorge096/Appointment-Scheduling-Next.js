apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: appointment-scheduling
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: appointment-scheduling
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Tráfico del ingress controller (traefik en k3s, ingress-nginx en local).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        # Tráfico desde otros pods del mismo namespace (probes, etc).
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS al kube-dns/CoreDNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Salida abierta (RDS, S3, SES, ECR, etc). En prod estricto podrías
    # listar CIDRs específicos de tu VPC / endpoints.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # Bloquear acceso a la metadata service de EC2.
              # - 169.254.169.254/32
