apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: appointment-scheduling
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: appointment-scheduling
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traffic from ingress controller (traefik on k3s, ingress-nginx locally).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        # Traffic from other pods in the same namespace (probes, etc).
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS to kube-dns/CoreDNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Open egress (RDS, S3, SES, ECR, etc). In strict production you could
    # list specific CIDRs from your VPC / endpoints.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # AWS SDK needs 169.254.169.254 to get temporary
              # credentials via Instance Profile (S3, SES, ECR). Do not block.
              # - 169.254.169.254/32
---
# ─── NetworkPolicy for error-pages ───────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: error-pages
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: error-pages
      app.kubernetes.io/component: error-pages
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traffic from the ingress controller (nginx-ingress and kube-system)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress: []  # error-pages doesn't need internet egress
