# Secret SOLO para local (minikube/docker-desktop con Postgres en compose).
# Reemplaza el stub del base via merge.
#
# Cambia estos valores por tus credenciales locales reales.
apiVersion: v1
kind: Secret
metadata:
  name: appointment-scheduling-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@host.docker.internal:5432/appointment_scheduling_dev?schema=public"
  NEXTAUTH_SECRET: "local-dev-secret-change-me-in-production"
