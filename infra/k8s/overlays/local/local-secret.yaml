# Secret ONLY for local (minikube/docker-desktop with Postgres in compose).
# Replaces the base stub via merge.
#
# Replace these values with your actual local credentials.
apiVersion: v1
kind: Secret
metadata:
  name: appointment-scheduling-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@host.docker.internal:5432/appointment_scheduling_dev?schema=public"
  NEXTAUTH_SECRET: "local-dev-secret-change-me-in-production"
