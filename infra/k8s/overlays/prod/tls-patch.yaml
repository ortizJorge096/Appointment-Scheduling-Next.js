# cert-manager + traefik termination TLS para prod.
# Si cert-manager no está instalado, el Ingress sigue funcionando con el
# self-signed default de traefik (degradación graciosa).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appointment-scheduling
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - appointment-scheduling.example.com
        - www.appointment-scheduling.example.com
      secretName: appointment-scheduling-tls
