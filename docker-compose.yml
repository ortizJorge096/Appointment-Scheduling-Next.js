# docker-compose.yml
# Complete local environment: Next.js + PostgreSQL
# Usage: docker compose up --build

services:

  # ── Base de datos PostgreSQL ──────────────────────────
  db:
    image: postgres:16-alpine
    container_name: valentinajimenez-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: valentinajimenez
      POSTGRES_USER: valentinajimenez
      POSTGRES_PASSWORD: valentinajimenez123

    ports:
      - "5432:5432" # exposed for Prisma Studio connections

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valentinajimenez -d valentinajimenez"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Aplicación Next.js ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are baked at build time. Defaults below make the plain
      # `docker compose up -d --build` work; override via shell/.env or run
      # `docker compose --env-file .env.local up -d --build`.
      args:
        NEXT_PUBLIC_HERO_IMAGES: "${NEXT_PUBLIC_HERO_IMAGES:-/hero/1.jpg,/hero/2.jpg,/hero/3.jpg,/hero/4.jpg}"
        NEXT_PUBLIC_WHATSAPP_NUMBER: "${NEXT_PUBLIC_WHATSAPP_NUMBER:-573001790511}"
        NEXT_PUBLIC_WHATSAPP_MESSAGE: "${NEXT_PUBLIC_WHATSAPP_MESSAGE:-¡Hola! Vengo de su sitio web y me gustaría más información.}"

    container_name: valentinajimenez-app
    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - .env.local

    environment:
      TZ: America/Bogota
      # Override DATABASE_URL to point to the db container
      DATABASE_URL: postgresql://valentinajimenez:valentinajimenez123@db:5432/valentinajimenez

    depends_on:
      db:
        condition: service_healthy

   #── Migrations (runs once and exits) ──────────────────
  migrate:
     build:
       context: .
       dockerfile: Dockerfile.migrate

     container_name: valentinajimenez-migrate

     env_file:
       - .env.local

     environment:
       DATABASE_URL: postgresql://valentinajimenez:valentinajimenez123@db:5432/valentinajimenez

     depends_on:
       db:
         condition: service_healthy

volumes:
  postgres_data: